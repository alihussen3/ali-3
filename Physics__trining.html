<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ نظام الوميض الذكي لمراجعة الفيزياء | ENG. 3LI ⚡</title>
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: #0d0d14;
            --accent-color: #00e5ff;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --text-main: #ffffff;
            --text-muted: #8e92a2;
            --border-color: #1a1a26;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 25px 15px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header-controls {
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 13, 20, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }

        .stat-item {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .stat-item span {
            color: var(--accent-color);
            font-size: 18px;
            font-weight: 800;
        }

        .stat-item.score-accent span {
            color: var(--success-color);
        }

        .chapter-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .chapter-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .chapter-btn:hover, .chapter-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        .card-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 780px;
            box-sizing: border-box;
            box-shadow: 0 25px 55px rgba(0,0,0,0.6);
            position: relative;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .chapter-badge {
            position: absolute;
            top: 22px;
            right: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .question-block {
            margin-top: 15px;
            margin-bottom: 35px;
            text-align: left;
        }

        .q-en {
            font-size: 23px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 14px;
            line-height: 1.45;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .q-ar {
            font-size: 19px;
            color: var(--text-muted);
            direction: rtl;
            text-align: right;
            line-height: 1.6;
            margin-top: 15px;
            border-right: 4px solid rgba(255,255,255,0.08);
            padding-right: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .option-btn {
            background-color: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 18px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:hover {
            background-color: rgba(255,255,255,0.04);
            border-color: #3a3a52;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            pointer-events: none;
        }

        .opt-en {
            font-size: 16px;
            color: var(--text-main);
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
        }

        .opt-ar {
            font-size: 14px;
            color: var(--text-muted);
            display: block;
            direction: rtl;
            text-align: right;
        }

        .option-btn.correct {
            background-color: rgba(46, 204, 113, 0.08) !important;
            border-color: var(--success-color) !important;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.15);
        }
        .option-btn.correct .opt-en { color: var(--success-color); }

        .option-btn.wrong {
            background-color: rgba(231, 76, 60, 0.08) !important;
            border-color: var(--error-color) !important;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.15);
        }
        .option-btn.wrong .opt-en { color: var(--error-color); }

        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 14px;
            display: none;
            animation: fadeIn 0.35s ease;
            direction: rtl;
            text-align: right;
        }

        .feedback-box.correct-style {
            background: rgba(46, 204, 113, 0.03);
            border: 1px solid rgba(46, 204, 113, 0.15);
            color: var(--success-color);
        }

        .feedback-box.wrong-style {
            background: rgba(231, 76, 60, 0.03);
            border: 1px solid rgba(231, 76, 60, 0.15);
            color: var(--error-color);
        }

        .explanation-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .explanation-text {
            color: var(--text-main);
            font-size: 15px;
            line-height: 1.55;
        }

        .next-btn {
            margin-top: 25px;
            background-color: var(--accent-color);
            color: #020205;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            display: none;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.25);
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(0, 229, 255, 0.45);
        }

        .engineer-footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-align: center;
            font-weight: 600;
        }

        .engineer-footer span {
            color: var(--accent-color);
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header-controls">
        <div class="stats-bar">
            <div class="stat-item">السؤال: <span id="current-index">1</span>/<span id="total-questions">0</span></div>
            <div class="stat-item score-accent">الإجابات الصحيحة: <span id="score-display">0</span></div>
            <div class="stat-item">النسبة الكلية: <span id="accuracy-display">0%</span></div>
        </div>

        <div class="chapter-selector" id="chapter-nav">
            <button class="chapter-btn active" onclick="filterChapter('all')">جميع الأسئلة (113)</button>
            <button class="chapter-btn" onclick="filterChapter(1)">شابتر 1</button>
            <button class="chapter-btn" onclick="filterChapter(2)">شابتر 2</button>
            <button class="chapter-btn" onclick="filterChapter(3)">شابتر 3</button>
            <button class="chapter-btn" onclick="filterChapter(4)">شابتر 4</button>
            <button class="chapter-btn" onclick="filterChapter(5)">شابتر 5</button>
            <button class="chapter-btn" onclick="filterChapter(6)">شابتر 6</button>
            <button class="chapter-btn" onclick="filterChapter(7)">شابتر 7</button>
        </div>
    </div>

    <div class="card-container" id="main-card">
        <div class="chapter-badge" id="card-chapter-tag">CHAPTER 1</div>
        
        <div class="question-block">
            <div class="q-en" id="q-english">Loading configuration...</div>
            <div class="q-ar" id="q-arabic">جاري تحميل الإعدادات المنهجية...</div>
        </div>
        
        <div class="options-grid" id="options-box"></div>
        
        <div class="feedback-box" id="feedback-box"></div>
        
        <div style="text-align: center;">
            <button class="next-btn" id="next-card-btn" onclick="nextQuestion()">السؤال التالي ➔</button>
        </div>
    </div>

    <div class="engineer-footer">
        CRAFTED WITH PRECISION BY <span>ENG. 3LI</span> © 2026
    </div>

    <script>
        // =========================================================================
        // قاعدة البيانات الشاملة للأسئلة - 113 سؤالاً من شابتر 1 إلى 7
        // =========================================================================
        const physicsDatabase = [
            // --- CHAPTER 1 (20 سؤال) ---
            { chapter: 1, qEn: "The unit of the Charge", qAr: "وحدة الشحنة الكهربائية", options: [{en:"Volt (V)", ar:"فولت"}, {en:"Newton (N)", ar:"نيوتن"}, {en:"Coulomb (C)", ar:"كولوم"}, {en:"Joule (J)", ar:"جول"}], correctIndex: 2 },
            { chapter: 1, qEn: "Which of the following pairs of charges will repel each other?", qAr: "أي من أزواج الشحنات التالية سيتنافر مع الآخر؟", options: [{en:"(+, -)", ar:"(+, -)"}, {en:"(+, +)", ar:"(+, +)"}, {en:"(+, neutral)", ar:"(+, متعادلة)"}, {en:"(-, neutral)", ar:"(-, متعادلة)"}], correctIndex: 1 },
            { chapter: 1, qEn: "Which pair of charges will attract each other?", qAr: "أي زوج من الشحنات سيتجاذب مع الآخر؟", options: [{en:"(+, +)", ar:"(+, +)"}, {en:"(-, -)", ar:"(-, -)"}, {en:"(+, -)", ar:"(+, -)"}, {en:"(-, +)", ar:"(-, +)"}], correctIndex: 2 },
            { chapter: 1, qEn: "If the distance between two charges is doubled, the electric force becomes:", qAr: "إذا تضاعفت المسافة بين شحنتين، فإن القوة الكهربائية تصبح:", options: [{en:"Four times larger", ar:"أربعة أضعاف"}, {en:"Two times larger", ar:"ضعفين"}, {en:"One-half", ar:"النصف"}, {en:"One-fourth", ar:"الربع"}], correctIndex: 3 },
            { chapter: 1, qEn: "If both charges are doubled and the distance remains the same, the force becomes:", qAr: "إذا تضاعفت كلتا الشحنتين وبقيت المسافة كما هي، فإن القوة تصبح:", options: [{en:"2 times larger", ar:"ضعفين"}, {en:"4 times larger", ar:"أربعة أضعاف"}, {en:"8 times larger", ar:"ثمانية أضعاف"}, {en:"Unchanged", ar:"لا تتغير"}], correctIndex: 1 },
            { chapter: 1, qEn: "If the distance between two charges is reduced to half, the electric force becomes:", qAr: "إذا قلت المسافة بين شحنتين إلى النصف، فإن القوة الكهربائية تصبح:", options: [{en:"Twice as large", ar:"ضعفين"}, {en:"Four times as large", ar:"أربعة أضعاف"}, {en:"Half as large", ar:"النصف"}, {en:"One-fourth as large", ar:"الربع"}], correctIndex: 1 },
            { chapter: 1, qEn: "If the source charge 'q' is positive, the direction of Electric field (E) is:", qAr: "إذا كانت الشحنة المصدر 'q' موجبة، فإن اتجاه المجال الكهربائي (E) يكون:", options: [{en:"Away from the charge", ar:"مبتعدًا عن الشحنة"}, {en:"Towards the charge", ar:"متجهًا نحو الشحنة"}, {en:"Both a & b", ar:"كلاهما"}, {en:"None of these", ar:"لا شيء مما سبق"}], correctIndex: 0 },
            { chapter: 1, qEn: "If the source charge 'q' is negative, the direction of Electric field (E) is:", qAr: "إذا كانت الشحنة المصدر 'q' سالبة، فإن اتجاه المجال الكهربائي (E) يكون:", options: [{en:"Away from the charge", ar:"مبتعدًا عن الشحنة"}, {en:"Towards the charge", ar:"متجهًا نحو الشحنة"}, {en:"Both a & b", ar:"كلاهما"}, {en:"None of these", ar:"لا شيء مما سبق"}], correctIndex: 1 },
            { chapter: 1, qEn: "The electric field lines for a point charge are directed radially:", qAr: "خطوط المجال الكهربائي لشحنة نقطية تتجه شعاعيًا:", options: [{en:"Outward for both negative and positive charge", ar:"للخارج لكل من الشحنة السالبة والموجبة"}, {en:"Inward for both negative and positive charge", ar:"للداخل لكل من الشحنة السالبة والموجبة"}, {en:"Outward for negative charge and inward for positive charge", ar:"للخارج للسالبة وللداخل للموجبة"}, {en:"Inward for negative charge and outward for positive charge", ar:"للداخل للسالبة وللخارج للموجبة"}], correctIndex: 3 },
            { chapter: 1, qEn: "The electric force (Fe) exerted on a positive charge (+q) placed in an electric field E:", qAr: "القوة الكهربائية (Fe) المؤثرة على شحنة موجبة (+q) موضوعة في مجال كهربائي E:", options: [{en:"has the same direction as E", ar:"لها نفس اتجاه E"}, {en:"Has opposite direction to E", ar:"لها اتجاه معاكس لـ E"}, {en:"Is perpendicular to E", ar:"عمودية على E"}, {en:"Has no direction", ar:"ليس لها اتجاه"}], correctIndex: 0 },
            { chapter: 1, qEn: "The electric force (F) exerted on a negative charge (-q) placed in an electric field E:", qAr: "القوة الكهربائية (F) المؤثرة على شحنة سالبة (-q) موضوعة في مجال كهربائي E:", options: [{en:"has the same direction as E", ar:"لها نفس اتجاه E"}, {en:"Has opposite direction to E", ar:"لها اتجاه معاكس لـ E"}, {en:"Is perpendicular to E", ar:"عمودية على E"}, {en:"Has no direction", ar:"ليس لها اتجاه"}], correctIndex: 1 },
            { chapter: 1, qEn: "What can be the sign of charges q1 and q2 in the figure?", qAr: "ما يمكن أن تكون إشارة الشحنتين q1 و q2 في الشكل؟", options: [{en:"q1 positive, q2 negative", ar:"q1 موجبة، q2 سالبة"}, {en:"q1 negative, q2 negative", ar:"q1 سالبة، q2 سالبة"}, {en:"q1 negative, q2 positive", ar:"q1 سالبة، q2 موجبة"}, {en:"q1 positive, q2 positive", ar:"q1 موجبة، q2 موجبة"}], correctIndex: 0 },
            { chapter: 1, qEn: "The electric force F between two charges q1 and q2 separated by r can be calculated as:", qAr: "القوة الكهربائية F بين شحنتين q1 و q2 تفصل بينهما مسافة r يمكن حسابها كالتالي:", options: [{en:"k (q1.q2 / r)", ar:"k (q1.q2 / r)"}, {en:"k (q1.q2 / r²)", ar:"k (q1.q2 / r²)"}, {en:"k (q1.q2 / r³)", ar:"k (q1.q2 / r³)"}, {en:"k (q1.q2 / r⁴)", ar:"k (q1.q2 / r⁴)"}], correctIndex: 1 },
            { chapter: 1, qEn: "The electric force F between two charges q1 and q2 separated by r is inversely proportional to:", qAr: "القوة الكهربائية F بين شحنتين q1 و q2 تفصل بينهما مسافة r تتناسب عكسيًا مع:", options: [{en:"r", ar:"r"}, {en:"r²", ar:"r²"}, {en:"r³", ar:"r³"}, {en:"r⁴", ar:"r⁴"}], correctIndex: 1 },
            { chapter: 1, qEn: "The magnitude of the electric field E due to a point charge q at a distance r from the charge is:", qAr: "مقدار المجال الكهربائي E الناتج عن شحنة نقطية q على مسافة r من الشحنة هو:", options: [{en:"k (q / r)", ar:"k (q / r)"}, {en:"k (q / r²)", ar:"k (q / r²)"}, {en:"k (q² / r²)", ar:"k (q² / r²)"}, {en:"k (q / r³)", ar:"k (q / r³)"}], correctIndex: 1 },
            { chapter: 1, qEn: "The unit of the electric field E is [with N: Newton, C: Coulomb]:", qAr: "وحدة المجال الكهربائي E هي [حيث N: نيوتن، C: كولوم]:", options: [{en:"C/N", ar:"C/N"}, {en:"N.C", ar:"N.C"}, {en:"N/C", ar:"N/C"}, {en:"N².C²", ar:"N².C²"}], correctIndex: 2 },
            { chapter: 1, qEn: "The Force per unit charge (F/q) is known as:", qAr: "القوة لكل وحدة شحنة (F/q) تعرف باسم:", options: [{en:"Electric field", ar:"المجال الكهربائي"}, {en:"Electric flux", ar:"الفيض الكهربائي"}, {en:"Electric current", ar:"التيار الكهربائي"}, {en:"Electric potential", ar:"الجهد الكهربائي"}], correctIndex: 0 },
            { chapter: 1, qEn: "The expression of linear charge density is given by:", qAr: "تعبير كثافة الشحنة الخطية يعطى بالعلاقة:", options: [{en:"λ = Q/A", ar:"λ = Q/A"}, {en:"λ = Q/V", ar:"λ = Q/V"}, {en:"λ = Q/l", ar:"λ = Q/l"}, {en:"λ = V/Q", ar:"λ = V/Q"}], correctIndex: 2 },
            { chapter: 1, qEn: "The surface charge density σ is defined by:", qAr: "كثافة الشحنة السطحية σ تعرف بالعلاقة:", options: [{en:"σ = Q/A", ar:"σ = Q/A"}, {en:"σ = Q A", ar:"σ = Q A"}, {en:"σ = Q/A²", ar:"σ = Q/A²"}, {en:"σ = Q A²", ar:"σ = Q A²"}], correctIndex: 0 },
            { chapter: 1, qEn: "When a particle of charge q and mass m is placed in an electric field E, the acceleration of the particle is expressed as:", qAr: "عندما يوضع جسيم شحنته q وكتلته m في مجال كهربائي E، فإن تسارع الجسيم يعبر عنه بالعلاقة:", options: [{en:"a = qm / E", ar:"a = qm / E"}, {en:"a = qE / m", ar:"a = qE / m"}, {en:"a = qmE", ar:"a = qmE"}, {en:"a = q²E / m", ar:"a = q²E / m"}], correctIndex: 1 },

            // --- CHAPTER 2 (8 سؤال) ---
            { chapter: 2, qEn: "The unit of electric flux is:", qAr: "وحدة الفيض الكهربائي هي:", options: [{en:"N.m² / C", ar:"N.m² / C"}, {en:"C.m² / N", ar:"C.m² / N"}, {en:"N.C / m²", ar:"N.C / m²"}, {en:"m² / N.C", ar:"m² / N.C"}], correctIndex: 0 },
            { chapter: 2, qEn: "A spherical gaussian surface surrounds a point charge q, the charge is moved to another location inside the surface. The total flux is:", qAr: "سطح غاوسي كروي يحيط بشحنة نقطية q، تم نقل الشحنة إلى موقع آخر داخل السطح. الفيض الكلي:", options: [{en:"Change", ar:"يتغير"}, {en:"Not change", ar:"لا يتغير"}, {en:"Increases", ar:"يزداد"}, {en:"Decreases", ar:"يقل"}], correctIndex: 1 },
            { chapter: 2, qEn: "Consider figure, where the normal to the surface of area A is at an angle (θ=90°) to the uniform electric field. Electric flux is:", qAr: "اعتبر الشكل، حيث العمودي على سطح مساحته A يصنع زاوية (θ=90°) مع المجال الكهربائي المنتظم. الفيض الكهربائي هو:", options: [{en:"ΦE = EA", ar:"ΦE = EA"}, {en:"ΦE = 0", ar:"ΦE = 0"}, {en:"ΦE = E", ar:"ΦE = E"}, {en:"ΦE = E/A", ar:"ΦE = E/A"}], correctIndex: 1 },
            { chapter: 2, qEn: "A rectangular area is oriented in a uniform Electric field directed left to right. Which geometry results in the maximum electric flux through the area?", qAr: "منطقة مستطيلة موضوعة في مجال كهربائي منتظم اتجاهه من اليسار إلى اليمين. أي شكل هندسي يعطي أقصى فيض كهربائي عبر المنطقة؟", options: [{en:"Surface perpendicular to the field", ar:"سطح عمودي على المجال"}, {en:"Surface parallel to the field", ar:"سطح موازٍ للمجال"}, {en:"Surface tilted at small angle", ar:"سطح مائل بزاوية صغيرة"}, {en:"Surface tilted at larger angle", ar:"سطح مائل بزاوية أكبر"}], correctIndex: 0 },
            { chapter: 2, qEn: "The electric flux depends on the:", qAr: "الفيض الكهربائي يعتمد على:", options: [{en:"Electric field", ar:"المجال الكهربائي"}, {en:"Area", ar:"المساحة"}, {en:"Angle between the surface and the electric field", ar:"الزاوية بين السطح والمجال الكهربائي"}, {en:"All of the above", ar:"كل ما سبق"}], correctIndex: 3 },

        ];

        let currentQuestionsList = [];
        let currentIndex = 0;
        let userScore = 0;
        let answered = false;
        let currentQuestionObj = null;

        function filterChapter(chapter) {
            if (chapter === 'all') {
                currentQuestionsList = [...physicsDatabase];
            } else {
                currentQuestionsList = physicsDatabase.filter(q => q.chapter === chapter);
            }
            currentIndex = 0;
            userScore = 0;
            answered = false;
            updateStats();
            loadQuestion();
            
            document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
            if (chapter === 'all') {
                document.querySelector('.chapter-btn:first-child').classList.add('active');
            } else {
                document.querySelectorAll('.chapter-btn').forEach(btn => {
                    if (btn.innerText.includes(chapter.toString())) btn.classList.add('active');
                });
            }
        }

        function updateStats() {
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-questions').innerText = currentQuestionsList.length;
            document.getElementById('score-display').innerText = userScore;
            let accuracy = currentQuestionsList.length ? Math.round((userScore / currentQuestionsList.length) * 100) : 0;
            document.getElementById('accuracy-display').innerText = accuracy;
        }

        function loadQuestion() {
            if (currentQuestionsList.length === 0) return;
            answered = false;
            currentQuestionObj = currentQuestionsList[currentIndex];
            document.getElementById('q-english').innerHTML = currentQuestionObj.qEn;
            document.getElementById('q-arabic').innerHTML = currentQuestionObj.qAr;
            document.getElementById('card-chapter-tag').innerHTML = `CHAPTER ${currentQuestionObj.chapter}`;
            
            let optionsHtml = '';
            currentQuestionObj.options.forEach((opt, idx) => {
                optionsHtml += `
                    <div class="option-btn" onclick="checkAnswer(${idx})">
                        <div class="opt-en">${opt.en}</div>
                        <div class="opt-ar">${opt.ar}</div>
                    </div>
                `;
            });
            document.getElementById('options-box').innerHTML = optionsHtml;
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('feedback-box').className = 'feedback-box';
            document.getElementById('next-card-btn').style.display = 'none';
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('correct', 'wrong'));
        }

        function checkAnswer(selected) {
            if (answered) return;
            answered = true;
            const isCorrect = (selected === currentQuestionObj.correctIndex);
            if (isCorrect) {
                userScore++;
                updateStats();
            }
            
            let optionsDivs = document.querySelectorAll('.option-btn');
            optionsDivs[currentQuestionObj.correctIndex].classList.add('correct');
            if (!isCorrect) {
                optionsDivs[selected].classList.add('wrong');
            }
            
            let feedbackBox = document.getElementById('feedback-box');
            let correctLetter = String.fromCharCode(65 + currentQuestionObj.correctIndex);
            let correctText = currentQuestionObj.options[currentQuestionObj.correctIndex].en;
            if (isCorrect) {
                feedbackBox.innerHTML = `<div class="explanation-title">✅ إجابة صحيحة!</div><div class="explanation-text">${correctLetter}. ${correctText} هي الإجابة الصحيحة.</div>`;
                feedbackBox.classList.add('correct-style');
            } else {
                feedbackBox.innerHTML = `<div class="explanation-title">❌ إجابة خاطئة</div><div class="explanation-text">الإجابة الصحيحة هي ${correctLetter}. ${correctText}</div>`;
                feedbackBox.classList.add('wrong-style');
            }
            feedbackBox.style.display = 'block';
            document.getElementById('next-card-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            if (!answered) return;
            if (currentIndex + 1 < currentQuestionsList.length) {
                currentIndex++;
                loadQuestion();
            } else {
                document.getElementById('q-english').innerHTML = "🎉 مبروك! 🎉";
                document.getElementById('q-arabic').innerHTML = `لقد أنهيت جميع أسئلة ${document.querySelector('.chapter-btn.active').innerText} بنجاح. إجمالي الإجابات الصحيحة: ${userScore} من ${currentQuestionsList.length}`;
                document.getElementById('options-box').innerHTML = '';
                document.getElementById('feedback-box').style.display = 'none';
                document.getElementById('next-card-btn').style.display = 'none';
            }
        }

        // بدء التطبيق
        filterChapter('all');
    </script>
